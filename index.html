<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinnacle Global School Portal</title>
<link rel="stylesheet" href="style.css">
<style>
body { font-family: Arial, sans-serif; margin:0; padding:0; text-align:center; background:#f4f4f4; }
.container { max-width:700px; margin:auto; padding:20px; background:white; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.1); margin-top:50px;}
input { padding:12px; width:90%; max-width:250px; margin:10px 0; border-radius:5px; border:1px solid #ccc; font-size:16px; }
button { padding:12px 25px; margin-top:10px; cursor:pointer; border:none; background:#3498db; color:white; border-radius:5px; font-size:16px; }
button:disabled { background:#ccc; cursor:not-allowed; }
p { font-size:16px; margin:5px 0; text-align:left; }
.hidden { display:none; }
.logo { width:120px; margin-bottom:15px; }
#loader { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); display:flex; justify-content:center; align-items:center; z-index:9999; display:none; }
.spinner { border:6px solid #f3f3f3; border-top:6px solid #3498db; border-radius:50%; width:50px; height:50px; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* Dashboard table */
table { width:100%; border-collapse: collapse; margin-top:20px; }
th, td { padding:12px; border:1px solid #ddd; text-align:left; font-size:16px; }
th { background:#3498db; color:white; }
@media (max-width:600px){
  .container { padding:15px; margin-top:30px; }
  th, td { font-size:14px; padding:8px; }
  input { width:100%; }
}
</style>
</head>
<body>

<div class="container">

  <!-- Login Section -->
  <div id="loginSection">
    <img src="images/logo.png" class="logo">
    <h2>Pinnacle Global School</h2>
    <h3>Student Login</h3>
    <input type="text" id="code" placeholder="Enter Login Code">
    <br>
    <button onclick="login()">Login</button>
    <p id="message" style="color:red;"></p>
  </div>

  <!-- Dashboard Section -->
  <div id="dashboardSection" class="hidden">
    <img src="images/logo.png" class="logo">
    <h2>Pinnacle Global School</h2>
    <p><b>Admission Number :</b> <span id="admission"></span></p>
    <p><b>Student Name :</b> <span id="name"></span></p>
    <p><b>Class :</b> <span id="class"></span></p>

    <!-- Fees Table -->
    <table>
      <tr>
        <th>Fees Type</th>
        <th>Months Paid</th>
      </tr>
      <tr>
        <td>Tuition Fees</td>
        <td id="tuition"></td>
      </tr>
      <tr>
        <td>Transport Fees</td>
        <td id="transport"></td>
      </tr>
      <tr>
        <td>Exam Fees</td>
        <td id="exam"></td>
      </tr>
    </table>

    <br>
    <button onclick="logout()">Logout</button>
  </div>

</div>

<!-- Loader -->
<div id="loader"><div class="spinner"></div></div>

<script src="script.js"></script>
</body>
</html>
