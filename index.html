<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Fee Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Favicon -->
<link rel="icon" href="images/logo.png">

<style>
body{font-family:Arial;margin:0;background:#f2f5ff;}
.header{background:#0b3d91;text-align:center;padding:20px;color:white;}
.logo{width:140px;margin-bottom:10px;}
.login-box{text-align:center;padding:30px;display:none;}
input{padding:12px;width:230px;font-size:16px;border:1px solid #ccc;border-radius:4px;margin:5px 0;}
button{padding:12px 25px;font-size:16px;background:#0b3d91;color:white;border:none;border-radius:4px;cursor:pointer;}
button:disabled{background:gray;}
.loader{display:none;text-align:center;padding:20px;font-size:18px;}
.profile{text-align:center;background:white;margin:15px;padding:25px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.student-name{font-size:22px;font-weight:bold;margin-bottom:10px;}
.info{font-size:15px;margin:6px 0;}
.section-title{background:#0b3d91;color:white;padding:12px;margin:15px;border-radius:6px;font-size:18px;font-weight:bold;text-align:center;}
.table-container{margin:15px;}
table{width:100%;border-collapse:collapse;background:white;}
th, td{border:1px solid #ddd;padding:10px;text-align:center;font-size:14px;}
th{background:#0b3d91;color:white;font-weight:bold;}
tr:nth-child(even){background:#e8f1ff;}
.fee-cards{display:none;padding:15px;}
.fee-card{background:white;border-radius:12px;padding:16px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.12);}
.fee-card div{margin:5px 0;font-size:14px;}
@media(max-width:600px){
  .table-container{display:none;}
  .fee-cards{display:block;}
}
.logout{text-align:center;margin:20px;}
#splash{position:fixed;top:0;left:0;right:0;bottom:0;background:#0b3d91;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999;color:white;}
#splash img{width:120px;margin-bottom:15px;}
</style>
</head>

<body>

<!-- Splash Screen -->
<div id="splash">
  <img src="images/logo.png" alt="Logo">
  <h2>Student Fee Portal</h2>
  <p>Loading...</p>
</div>

<!-- Header -->
<div class="header">
  <img src="images/logo.png" class="logo">
  <h2>Student Fee Portal</h2>
</div>

<!-- Login -->
<div class="login-box" id="loginBox">
  <h3>Student Login</h3>
  <input type="text" id="loginCode" placeholder="Enter Login Code">
  <br><br>
  <button id="loginBtn" onclick="login()">Login</button>
</div>

<div class="loader" id="loader">Loading Student Data...</div>

<!-- Portal -->
<div id="portal" style="display:none">
  <div class="profile">
    <div class="student-name" id="studentName"></div>
    <div class="info" id="class"></div>
    <div class="info" id="adm"></div>
    <div class="info" id="father"></div>
    <div class="info" id="mother"></div>
    <div class="info" id="phone"></div>
    <div class="info" id="address"></div>
  </div>

  <div class="section-title">Fee Details</div>

  <!-- Desktop Table -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Date</th><th>Slip No</th><th>Amount</th><th>Fee Type</th><th>Session</th><th>Tuition</th><th>Transport</th><th>Exam</th>
        </tr>
      </thead>
      <tbody id="feeTable"></tbody>
    </table>
  </div>

  <!-- Mobile Cards -->
  <div class="fee-cards" id="feeCards"></div>

  <div class="logout"><button onclick="logout()">Logout</button></div>
</div>

<script src="script.js" defer></script>

<script>
window.addEventListener('load', ()=>{
    setTimeout(()=>{
        document.getElementById('splash').style.display='none';
        document.getElementById('loginBox').style.display='block';
    }, 1000);
});
</script>

</body>
</html>
