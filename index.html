<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Fee Portal</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* INSTALL HEADER */

.install-header{
position:sticky;
top:0;
background:white;
padding:10px;
border-bottom:1px solid #ddd;
z-index:999;
}

#installBtn{
background:#1e63d5;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

/* LOGIN */

#loginPage{
text-align:center;
padding:40px;
}

.logo{
width:120px;
margin-bottom:20px;
}

input{
padding:10px;
width:250px;
margin:8px;
}

button{
padding:10px 16px;
}

/* STUDENT DETAILS */

#studentDetails p{
margin:4px;
}

#studentDetails strong{
font-weight:bold;
}

/* FEE HEADER */

.fee-header{
background:gold;
padding:10px;
font-weight:bold;
}

/* TABLE DESKTOP */

table{
width:100%;
border-collapse:collapse;
}

thead{
background:#1e63d5;
color:white;
}

th,td{
padding:8px;
border:1px solid #ddd;
text-align:center;
}

/* MOBILE CARDS */

.fee-card{
padding:10px;
margin:10px;
border-radius:8px;
}

.fee-card:nth-child(odd){
background:#eaf2ff;
}

.fee-card:nth-child(even){
background:white;
}

.loading{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
justify-content:center;
align-items:center;
flex-direction:column;
}

</style>
</head>

<body>

<!-- INSTALL HEADER -->

<div class="install-header">
<button id="installBtn">Install App</button>
</div>

<!-- LOADING SCREEN -->

<div id="loadingScreen" class="loading">

<img src="logo.png" width="120">

<p>Loading...</p>

</div>

<!-- LOGIN PAGE -->

<div id="loginPage">

<img src="logo.png" class="logo">

<h2>Student Login</h2>

<input id="adm" placeholder="Admission Number"><br>

<input id="dob" placeholder="Date of Birth"><br>

<button onclick="login()">Login</button>

</div>

<!-- DASHBOARD -->

<div id="dashboard" style="display:none;padding:15px">

<h2>Student Details</h2>

<div id="studentDetails"></div>

<div class="fee-header">Paid Fee Details</div>

<!-- DESKTOP TABLE -->

<table id="feeTable">

<thead>

<tr>

<th>Date</th>
<th>Slip Number</th>
<th>Tuition Fee Months</th>
<th>Transport Fee Months</th>
<th>Exam Fee Months</th>
<th>Amount Paid</th>
<th>Payment Mode</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

<!-- MOBILE CARDS -->

<div id="mobileCards"></div>

<button onclick="logout()">Logout</button>

</div>

<script src="script.js"></script>

</body>
</html>
